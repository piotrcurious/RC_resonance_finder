<svg width="700" height="350" viewBox="0 0 700 350" xmlns="http://www.w3.org/2000/svg">
  <style>
    .wire { stroke: black; stroke-width: 2; fill: none; }
    .comp { stroke: black; stroke-width: 2; fill: none; }
    .text { font-family: monospace; font-size: 14px; }
    .node { fill: black; }
  </style>

  <!-- Digital Pin -->
  <text x="40" y="50" class="text">Digital Pin</text>
  <line x1="120" y1="45" x2="160" y2="45" class="wire"/>

  <!-- R0 -->
  <rect x="160" y="35" width="60" height="20" class="comp"/>
  <text x="165" y="30" class="text">R0 ~250Ω</text>

  <!-- Wire to R1 -->
  <line x1="220" y1="45" x2="260" y2="45" class="wire"/>

  <!-- R1 -->
  <rect x="260" y="35" width="60" height="20" class="comp"/>
  <text x="270" y="30" class="text">R1 1Ω</text>

  <!-- Wire to Node V1 -->
  <line x1="320" y1="45" x2="360" y2="45" class="wire"/>
  <circle cx="360" cy="45" r="4" class="node"/>
  <text x="345" y="70" class="text">V1</text>

  <!-- Branch to C1 -->
  <line x1="360" y1="45" x2="360" y2="100" class="wire"/>
  <line x1="350" y1="100" x2="370" y2="100" class="comp"/>
  <line x1="350" y1="110" x2="370" y2="110" class="comp"/>
  <text x="375" y="110" class="text">C1 0.5µF</text>

  <!-- Ground C1 -->
  <line x1="360" y1="110" x2="360" y2="140" class="wire"/>
  <line x1="345" y1="140" x2="375" y2="140" class="wire"/>
  <line x1="350" y1="145" x2="370" y2="145" class="wire"/>
  <line x1="355" y1="150" x2="365" y2="150" class="wire"/>

  <!-- Wire to Node V2 -->
  <line x1="360" y1="45" x2="460" y2="45" class="wire"/>
  <circle cx="460" cy="45" r="4" class="node"/>
  <text x="445" y="70" class="text">V2</text>

  <!-- A0 -->
  <line x1="460" y1="45" x2="540" y2="45" class="wire"/>
  <text x="550" y="50" class="text">A0</text>

  <!-- R2 -->
  <line x1="460" y1="45" x2="460" y2="100" class="wire"/>
  <rect x="440" y="100" width="40" height="20" class="comp"/>
  <text x="420" y="95" class="text">R2 ?</text>

  <!-- C2 -->
  <line x1="460" y1="120" x2="460" y2="150" class="wire"/>
  <line x1="450" y1="150" x2="470" y2="150" class="comp"/>
  <line x1="450" y1="160" x2="470" y2="160" class="comp"/>
  <text x="475" y="160" class="text">C2 10µF</text>

  <!-- Ground C2 -->
  <line x1="460" y1="160" x2="460" y2="190" class="wire"/>
  <line x1="445" y1="190" x2="475" y2="190" class="wire"/>
  <line x1="450" y1="195" x2="470" y2="195" class="wire"/>
  <line x1="455" y1="200" x2="465" y2="200" class="wire"/>
</svg>
